<!DOCTYPE html>
<html>
<head>
    <title>Online Booking App</title>
</head>
<body>

    <h1>Online Booking Form</h1>

    <form>
        <label>Name:</label><br>
        <input type="text" required><br><br>

        <label>Email:</label><br>
        <input type="email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" required><br><br>

        <label>Booking Date:</label><br>
        <input type="date" required><br><br>

        <label>Booking Time:</label><br>
        <input type="time" required><br><br>

        <label>Service:</label><br>
        <select>
            <option>Hotel Room</option>
            <option>Bus Ticket</option>
            <option>Train Ticket</option>
            <option>Movie Ticket</option>
        </select><br><br>

        <input type="submit" value="Book Now">
    </form>

</body>
</html>
